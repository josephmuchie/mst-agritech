# Production Docker Compose — run on a VPS or any Docker host
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-agritech_db}
      POSTGRES_USER: ${DB_USER:-agritech}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agritech} -d ${DB_NAME:-agritech_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-8081}:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-agritech_db}
      DB_USER: ${DB_USER:-agritech}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JASYPT_PASSWORD: ${JASYPT_PASSWORD:?Set JASYPT_PASSWORD in .env}
      SERVER_PORT: 8081
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8081}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
