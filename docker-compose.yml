services:
  postgres:
    image: postgres:16-alpine
    container_name: agritech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agritech_db
      POSTGRES_USER: agritech
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agritech_dev_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agritech -d agritech_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agritech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agritech-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mstagritech.co.zw}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-pgadmin_pass}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  core-api:
    build:
      context: ./backend/core-api
      dockerfile: Dockerfile
    container_name: agritech-core-api
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agritech_db
      DB_USERNAME: agritech
      DB_PASSWORD: ${POSTGRES_PASSWORD:-agritech_dev_pass}
      REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-replace_me_with_a_very_long_secret_key_at_least_512_bits}
      JASYPT_ENCRYPTOR_PASSWORD: ${JASYPT_PASSWORD:-jasypt_dev_pass}
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  notification-service:
    build:
      context: ./backend/notification-service
      dockerfile: Dockerfile
    container_name: agritech-notification
    restart: unless-stopped
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080/api/v1
    container_name: agritech-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - core-api

volumes:
  postgres_data:
